name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture formatter output
        run: |
          npm run format
          git diff --binary > formatter.patch
      - uses: actions/upload-artifact@v4
        with:
          name: apk-020-formatter-patch
          path: formatter.patch
      - run: git diff --check
