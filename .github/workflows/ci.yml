name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run project checks
        id: project-checks
        continue-on-error: true
        run: npm run check > check.log 2>&1
      - name: Upload check diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: check-diagnostics
          path: check.log
      - name: Report check failure
        if: steps.project-checks.outcome == 'failure'
        run: |
          cat check.log
          exit 1
      - run: npm run build
      - run: git diff --check
