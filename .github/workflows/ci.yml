name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture checks
        run: |
          npm run format:check > format.txt 2>&1; echo $? > format.exit
          npm run lint > lint.txt 2>&1; echo $? > lint.exit
          npm run typecheck > typecheck.txt 2>&1; echo $? > typecheck.exit
          npm run test > test.txt 2>&1; echo $? > test.exit
      - uses: actions/upload-artifact@v4
        with:
          name: check-reports
          path: |
            format.txt
            format.exit
            lint.txt
            lint.exit
            typecheck.txt
            typecheck.exit
            test.txt
            test.exit
