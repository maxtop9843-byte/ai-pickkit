name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture quality output
        run: |
          set +e
          npm run check > ci-quality.log 2>&1
          status=$?
          cat ci-quality.log
          echo "$status" > ci-quality.status
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: apk-021-quality-output
          path: |
            ci-quality.log
            ci-quality.status
      - run: npm run build
      - run: git diff --check
