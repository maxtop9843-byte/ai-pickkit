name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Format drifted files for recovery
        run: >-
          npx prettier --write
          docs/PICKKIT_DESIGN.md
          'src/app/models/[id]/page.tsx'
          'src/app/providers/[provider]/page.tsx'
          src/lib/cost-calculator.test.ts
          src/lib/model-guides.ts
          TASK_QUEUE.md
      - name: Upload formatted recovery files
        uses: actions/upload-artifact@v4
        with:
          name: prettier-recovery
          path: |
            docs/PICKKIT_DESIGN.md
            src/app/models/[id]/page.tsx
            src/app/providers/[provider]/page.tsx
            src/lib/cost-calculator.test.ts
            src/lib/model-guides.ts
            TASK_QUEUE.md
      - run: npm run check
      - run: npm run build
      - run: git diff --check
