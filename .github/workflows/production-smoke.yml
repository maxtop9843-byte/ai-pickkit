name: Production Smoke
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: production-smoke-main
  cancel-in-progress: false
jobs:
  production-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Wait for production and verify public routes
        run: node scripts/production-smoke.mjs
